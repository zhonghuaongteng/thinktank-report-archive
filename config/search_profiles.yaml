profiles:
  broad_innovation_support:
    description: >
      后续展开检索的默认宽口径。保留支撑科技创新发展的报告、论文和政策简报，
      覆盖研发体系、科研基础设施、技术扩散、成果转化、产业化、关键产业、
      产业链供应链、清洁技术、生物技术、量子与空间技术、数字基础设施、
      创新金融、研发税收激励、标准/计量/质量基础设施、测试验证、产业公地、
      科技人才和国防创新；排除只命中AI治理或科技治理的纯治理候选。
    topic_tags_any:
      - 科技创新
      - 半导体
      - 先进制造
      - 数字经济
      - 科技人才
      - 国防AI
    exclude_governance_only: true
  ai_governance_watch:
    description: >
      AI治理专题监测画像。用于需要集中检查AI治理、科技治理、国防AI和涉华AI政策材料的场景。
    topic_tags_any:
      - AI治理
      - 科技治理
      - 国防AI
      - 中国与上海相关
    exclude_governance_only: false
